name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies
        run: sudo apt-get install -y libsasl2-dev protobuf-compiler libcurl4-openssl-dev

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: fmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy -- -D warnings
        env:
          SQLX_OFFLINE: true

      - name: test
        run: cargo test
        env:
          SQLX_OFFLINE: true